events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream client_upstream {
        server client:5173;
    }

    upstream server_upstream {
        server server:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # ----------------------------------------------------------------------
        # CRITICAL SECURITY HEADERS FOR WEBCONTAINERS
        # ----------------------------------------------------------------------
        # These headers are required to enable SharedArrayBuffer, which 
        # WebContainers (Node.js in browser) rely on.
        # ----------------------------------------------------------------------
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        # Proxy Frontend (Vite Dev Server)
        location / {
            proxy_pass http://client_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy Backend API
        location /api {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://server_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy GraphQL
        location /graphql {
            proxy_pass http://server_upstream/graphql;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
